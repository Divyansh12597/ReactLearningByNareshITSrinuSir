<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
  rel="stylesheet"
  integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
  crossorigin="anonymous"
/>

<div id="root"></div>

<script type="text/babel">
  const Table = (props) => {
    const { headers, data, columns } = props;
    return (
      <table className="table table-dark table-striped">
        <thead>
          <tr>
            {headers.map((val, index) => {
              return <th key={"th" + index}>{val}</th>;
            })}
          </tr>
        </thead>
        <tbody>
          {data.map((obj, index) => {
            return (
              <tr key={"tr" + index}>
                {columns.map((val, index) => {
                  return <td key={"td" + index}>{obj[val]}</td>;
                })}
              </tr>
            );
          })}
        </tbody>
      </table>
    );
  };

  function App() {
    const[data, setData] = React.useState([])
    const fnGetUsers = () => {
        // Handle AJAX using XMLHttpRequest class

        const obj =  new XMLHttpRequest();

        //1. Prepare the request

        obj.open("get", "https://jsonplaceholder.typicode.com/users")

        //2. send the request to the server.

        obj.send()

        //3. Request process by server / prepare the res and send res  back  to client

        //4. receive  the response (Success / failure)

        // Success
        obj.onload= () => {
            let res = obj.responseText
            res = JSON.parse(res)
            setData(res)
            console
        }
        // error
        obj.onerror=() => {
            alert('success')
        }
    };

    return (
      <div>
        <button type="button" className="btn btn-primary" onClick={fnGetUsers}>
          Get User
        </button>
        {data.length > 0 ?
        <Table
          headers={["ID", "Name", "Phone Number"]}
          data={data}
          columns={["id", "name", "phone"]}
        /> 
        : 
        <h1>Data Not Found</h1> }
      </div>
    );
  }

  var root = ReactDOM.createRoot(document.querySelector("#root"));
  root.render(<App />);
</script>
