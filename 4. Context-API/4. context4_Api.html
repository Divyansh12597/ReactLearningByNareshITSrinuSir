<!-- We can create multiple context as well -->

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<div id="root"></div>

<script type="text/babel">
    const ctx1 = React.createContext(); //Create Context
    const ctx2 = React.createContext(); //Create Context

    const I = () => {
        const ctxData1 = React.useContext(ctx1);
        return <div>I:{ctxData1}</div>;
    };
    const H = () => {
        return (
            <div>
                H
                <I />
            </div>
        );
    };
    const G = () => {
        const ctxData2 = React.useContext(ctx2);
        return <div>G:{ctxData2[0]}</div>;
    };
    const F = () => {
        return <div>F</div>;
    };
    const E = () => {
        const ctxData2 = React.useContext(ctx2);
        return <div>E:{ctxData2[1]}</div>;
    };
    const D = () => {
        return (
            <div>
                D
                <E />
            </div>
        );
    };
    const C = () => {
        return (
            <div>
                C
                <D />
            </div>
        );
    };
    const B = () => {
        return (
            <div>
                B
                <C />
            </div>
        );
    };
    const A = () => {
        return <div>A</div>;
    };

    function App() {
        const name = "sachin"
        const students = ["student1", "student2"]
        return (
            <div>
                <h1>App</h1>
                <ctx1.Provider value={name}>
                    <ctx2.Provider value={students}>
                        <A />
                        <B />
                        <F />
                        <G />
                        <H />
                    </ctx2.Provider>
                </ctx1.Provider>
            </div>
        );
    }

    var root = ReactDOM.createRoot(document.querySelector("#root"));
    root.render(<App />);
</script>
