this is the sibiling: passing data one sibiling to another sibling

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<div id="root"></div>

<script type="text/babel">
  const A = (props) => {

    const [name, setName] = React.useState("");
    
    const fchange = (eve) => {
      const value = eve.target.value;
      setName(value);
    };

    const fclick = () => {
        props.myCB(name)

    };
    return (
      <div>
        <h1>
          Child: <input onChange={fchange} />
        </h1>
        <button onClick={fclick}>Pass data to sibilig</button>
      </div>
    );
  };

  const B =(props) => {
    return <div>
        <h1>B: {props.name}</h1>
        </div>
  }

  function App() {
    const [name, setName] = React.useState("");
    const cb = (data) => {
      setName(data);
    };

    return (
      <div>
        <h1>Parent</h1>
        <A myCB={cb} />
        <B name = {name}/>
      </div>
    );
  }

  var root = ReactDOM.createRoot(document.querySelector("#root"));
  root.render(<App />);
</script>
